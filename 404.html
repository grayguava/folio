<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · grayguava</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-page { text-align: center; }
    .error-page h1 { font-size: 4rem; margin-bottom: 0.5rem; }
    .error-page p { color: var(--text-dim); margin-bottom: 2rem; }
    .error-page a { color: var(--accent); }
    .error-page a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="error-page">
      <header class="page-header">
        <h1>404</h1>
        <p>the page you're looking for simply doesn't exist.</p>
        <p><a href="/">← go home</a> or press <kbd>h</kbd></p>
      </header>
    </div>
  </div>
  <script src="assets/js/theme.js"></script>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
    document.addEventListener('keydown', function(e) {
      if (e.key === 'h') window.location.href = '/';
    });
  </script>
</body>
</html>
